server:
  port: 8080

spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:h2:mem:customerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    # Ensures data.sql runs AFTER Hibernate creates the schema
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  # Disable RabbitMQ auto-connection at startup (no broker in local dev)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    stream:
      default-binder: rabbit
      bindings:
        petEvents-out-0:
          destination: pet-events
          content-type: application/json
      rabbit:
        bindings:
          petEvents-out-0:
            producer:
              routing-key-expression: '''pet.deactivated'''

eureka:
  client:
    fetch-registry: false
    register-with-eureka: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  health:
    rabbit:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
      export:
        enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

logging:
  level:
    org.springframework.samples.petclinic: DEBUG
    org.hibernate.SQL: DEBUG
